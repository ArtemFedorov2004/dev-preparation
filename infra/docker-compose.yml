version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: devprep-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devprep}
      POSTGRES_USER: ${POSTGRES_USER:-devprep}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devprep}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devprep} -d ${POSTGRES_DB:-devprep}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: devprep-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-devprep}
      KC_DB_USERNAME: ${POSTGRES_USER:-devprep}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-devprep}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: true
    ports:
      - "8443:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: devprep-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devprep}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      tags:
        - localhost:5000/devprep/backend:0.0.1
    container_name: devprep-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-devprep}
      DB_USER: ${POSTGRES_USER:-devprep}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-devprep}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-devprep}
      REDIS_ADDR:  redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-devprep}
      REDIS_DB: ${REDIS_DB:-0}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    restart: unless-stopped
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        JAR_FILE: target/devprep-frontend-0.1.0-SNAPSHOT.jar
      tags:
        - localhost:5000/devprep/frontend:0.0.1
    container_name: devprep-frontend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://172.17.0.1:8443}
      API_BASE_URL: http://backend:8081
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - keycloak

volumes:
  postgres_data:
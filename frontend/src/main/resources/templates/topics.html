<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<div th:replace="~{fragments/head :: head}"></div>
<body>
<div th:replace="~{fragments/navbar :: navigation}"></div>
<section class="max-w-7xl mx-auto px-4 py-10>">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Темы</h1>
        <p class="text-gray-600 mt-2">Выберите тему для изучения вопросов</p>
    </div>

    <div th:if="${topics != null and !topics.isEmpty()}"
         class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <a th:each="topic : ${topics}"
           th:href="@{/topics/{slug}(slug=${topic.slug})}"
           class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 hover:shadow-md hover:border-indigo-200 transition-all group">
            <div class="text-4xl mb-3" th:text="${topic.icon ?: '📋'}">📋</div>
            <h2 class="text-lg font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors"
                th:text="${topic.name}">Название темы</h2>
            <p class="text-sm text-gray-500 mt-1 line-clamp-2"
               th:text="${topic.description ?: 'Explore questions on this topic'}">Описание</p>
            <div class="mt-4 text-sm text-indigo-600 font-medium group-hover:underline">
                Смотреть вопросы →
            </div>
        </a>
    </div>
</section>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>

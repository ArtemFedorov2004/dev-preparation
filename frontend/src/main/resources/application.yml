devprep:
  api:
    base-url: ${API_BASE_URL:http://localhost:8081}
  registration-id: keycloak
spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_URL:http://localhost:8443}/realms/${KEYCLOAK_REALM:devprep}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:devprep-frontend}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:2RZ5MDBmYtZ1dp9X5Xa9UxddL1ok90bt}
            scope:
              - openid
              - microprofile-jwt
logging:
  level:
    com.devprep: DEBUG
    org.springframework.security: INFO